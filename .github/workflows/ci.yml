name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Tests (Python 3.14)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.3"
          python-version: "3.14"
          enable-cache: true

      - name: Sync project
        run: uv sync --locked

      - name: Run tests
        run: uv run pytest -q

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.3"
          python-version: "3.14"
          enable-cache: true

      - name: Ruff check
        run: uvx --from 'ruff>=0.6' ruff check src tests

      - name: Ruff format check
        run: uvx --from 'ruff>=0.6' ruff format --check src tests

  typecheck:
    name: Type check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.3"
          python-version: "3.14"
          enable-cache: true

      - name: Sync project
        # Pyright needs the project's runtime dependencies on its import
        # path to resolve types. `uv sync` materializes them in the lockfile
        # venv that `uv run pyright` then picks up.
        run: uv sync

      - name: Pyright
        run: uv run --with 'pyright>=1.1' pyright src

  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.3"
          python-version: "3.14"
          enable-cache: true

      - name: Sync project
        run: uv sync

      - name: Run pytest with coverage
        # Gate is 70% because a large fraction of the CLI and reporting
        # surfaces are exercised through `subprocess.run` invocations that
        # coverage.py does not see. The library modules themselves have
        # >=80% line+branch coverage when inspected directly. Raising the
        # gate requires wiring subprocess coverage (coverage[toml] +
        # sitecustomize) which is a follow-up.
        run: uv run --with pytest-cov pytest --cov=cldc --cov-report=term-missing --cov-report=xml --cov-fail-under=70

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    # Non-blocking: surfaces vulnerable transitive deps without breaking CI.
    # Re-evaluate once the alert volume is known and triage is wired up.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.3"
          python-version: "3.14"
          enable-cache: true

      - name: Sync project
        run: uv sync --locked

      - name: Run pip-audit
        run: uv run --with 'pip-audit>=2.7' pip-audit --strict --progress-spinner off

  package:
    name: Package smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.3"
          python-version: "3.14"
          enable-cache: true

      - name: Build distributions
        run: uv build --clear

      - name: Smoke test wheel
        run: uv run --isolated --no-project --with dist/*.whl tests/smoke_test.py

      - name: Smoke test source distribution
        run: uv run --isolated --no-project --with dist/*.tar.gz tests/smoke_test.py
