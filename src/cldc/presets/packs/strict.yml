# cldc preset: strict
#
# Opinionated guardrails for teams that want source changes to come with
# tests, architecture reads, and a CI sign-off claim. Pair with the
# `default` preset for full coverage.

rules:
  - id: preset-strict-tests-follow-source
    kind: couple_change
    mode: block
    paths:
      - "src/**"
    when_paths:
      - "tests/**"
      - "test/**"
    message: Source changes under src/** must include matching test updates.

  - id: preset-strict-architecture-read-before-edit
    kind: require_read
    mode: warn
    paths:
      - "src/**"
    before_paths:
      - "docs/rfcs/**"
      - "docs/architecture/**"
      - "ARCHITECTURE.md"
    message: Read the architecture context before editing core source.

  - id: preset-strict-require-ci-green-claim
    kind: require_claim
    mode: block
    when_paths:
      - "src/**"
    claims:
      - "ci-green"
    message: Require a `ci-green` claim to ship source changes under src/**.
