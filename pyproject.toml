
[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "claude-md-compiler"
version = "0.1.0"
description = "Compile CLAUDE.md into enforceable repo policy for Claude Code"
readme = "README.md"
license = "MIT"
authors = [
  { name = "Hermes Agent" },
]
keywords = ["claude", "policy", "cli", "compiler", "ci", "automation"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Build Tools",
  "Topic :: Software Development :: Quality Assurance",
]
requires-python = ">=3.11"
dependencies = [
  "PyYAML>=6.0",
]

[project.urls]
Homepage = "https://github.com/AbdelStark/claude-md-compiler"
Repository = "https://github.com/AbdelStark/claude-md-compiler"
Issues = "https://github.com/AbdelStark/claude-md-compiler/issues"

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
]

[project.scripts]
cldc = "cldc.cli.main:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
