# Pre-commit hooks for claude-md-compiler.
#
# Install once with:
#     uvx pre-commit install
# Run manually with:
#     uvx pre-commit run --all-files
#
# The hooks here are a strict subset of the CI quality gates so local runs
# catch the same issues the pipeline will: ruff lint + ruff format on every
# commit, plus the standard hygiene checks for whitespace, EOF newlines,
# YAML/TOML syntax, and large-file accidents. `pyright` is intentionally
# left out of pre-commit because it needs the full project venv, which
# drives up commit latency; CI still runs it on every PR.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format
